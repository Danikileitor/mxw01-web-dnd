<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Generador de Tickets D&D 2024</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/print.css">
</head>

<body>
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="nav-logo">
                <img src="favicon-32x32.png" alt="Inicio">
                <span>Master Toolkit</span>
            </a>
        </div>

        <div class="nav-center">
            <div class="tool-dropdown">
                <span class="current-tool-title">Generador de Conjuros</span>
                <div id="spellHistory" class="dropdown-content">
                    <div class="dropdown-header">Recientes</div>
                    <div id="historyList">
                        <span class="empty-history">No hay conjuros recientes</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-right">
            <div class="nav-links">
                <a href="conjuros.html" class="nav-item active">✨ Conjuros</a>
                <a href="monstruos.html" class="nav-item">👾 Monstruos</a>
                <a href="objetos.html" class="nav-item">⚔️ Objetos</a>
                <a href="momir.html" class="nav-item">🎲 Momir</a>
            </div>
        </div>
    </nav>


    <div class="main-container">
        <!-- FORMULARIO -->
        <form id="ticketForm">
            <div class="form-group">
                <label>Buscar Conjuro (PHB 2024)</label>
                <select id="conjuroSelector" onchange="cargarDatosConjuro()">
                    <option value="">Selecciona un conjuro...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sistema de Medida</label>
                <select id="unidadSelector" onchange="guardarPreferencias(); cargarDatosConjuro()">
                    <option value="pies">Pies</option>
                    <option value="metros">Metros</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre del Conjuro</label>
                <input type="text" name="nombre" placeholder="Ej: Bola de Fuego">
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 0 0 100px;">
                    <label>Nivel</label>
                    <input type="number" name="nivel" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Escuela</label>
                    <select name="escuela">
                        <option value="EV">Evocación</option>
                        <option value="A">Abjuración</option>
                        <option value="C">Conjuración</option>
                        <option value="N">Nigromancia</option>
                        <option value="T">Transmutación</option>
                        <option value="EN">Encantamiento</option>
                        <option value="D">Adivinación</option>
                        <option value="I">Ilusionismo</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Tiempo de Lanzamiento</label>
                <input type="text" name="tiempo" placeholder="Ej: Acción, Acción adicional">
                <div class="ritual-container">
                    <label class="checkbox-container">
                        <span>¿Es un Ritual?</span>
                        <input type="checkbox" name="ritual" onchange="generarTicket()">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">
                        <span>Mostrar Materiales</span>
                        <input type="checkbox" id="chkMateriales"
                            onchange="guardarPreferencias(); cargarDatosConjuro()">
                        <span class="checkmark"></span>
                    </label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Duración</label>
                    <input type="text" name="duracion" placeholder="Ej: Instantáneo, 1 minuto">
                </div>
                <div class="form-group">
                    <label>Alcance</label>
                    <input type="text" name="rango" placeholder="Ej: 30 pies, Lanzador">
                </div>
            </div>

            <div class="form-group">
                <label>Componentes</label>
                <input type="text" name="componentes" placeholder="Ej: V, S, M (una pluma)">
            </div>

            <div class="form-group">
                <label>Descripción del Conjuro</label>
                <textarea name="text" rows="10" placeholder="Describe los efectos del conjuro..."></textarea>
            </div>

            <div class="form-group">
                <label>Fuente / Referencia</label>
                <input type="text" name="fuente" placeholder="Ej: Manual del Jugador 2024 p. 294">
            </div>

            <button type="button" onclick="generarTicket()">Generar Ticket</button>
        </form>

        <!-- PREVISUALIZACIÓN -->
        <div class="canvas-container">
            <canvas id="ticketCanvas" width="384"></canvas>
            <button id="btnPrint" onclick="imprimirTicket()" disabled>🖨️ IMPRIMIR</button>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script src="js/conjuros.js"></script>
    <script type="module" src="js/print.js"></script>
</body>

</html>
